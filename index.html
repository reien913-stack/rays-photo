<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rays photo</title>
    <style>
        /* 全体のスタイル */
        body {
            background-color: #121212; /* 深い黒 */
            color: #e0e0e0; /* 柔らかい白 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダー（タイトル） */
        header {
            margin: 60px 0;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
        
        h1 {
            font-weight: 200;
            font-size: 1.5rem;
        }

        /* 写真のギャラリー部分 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
        }

        .photo-card {
            background: #1e1e1e;
            overflow: hidden;
            aspect-ratio: 3 / 2; /* 写真の比率 */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }

        .photo-card:hover {
            opacity: 0.7; /* ホバーで少し暗くする演出 */
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 枠いっぱいに収める */
        }

        /* フッター */
        footer {
            margin: 80px 0 40px;
            font-size: 0.7rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>rays photo</h1>
    </header>

    <main class="gallery">
        <div class="photo-card">
            <img src="photo01.jpg" alt="photoShot 01">
        </div>
        <div class="photo-card">
            <img src="photo02.jpg" alt="photoShot 02">
        </div>
        <div class="photo-card">
            <img src="photo03.jpg" alt="photoShot 03">
        </div>
        </main>

    <footer>
        &copy; 2026 rays photo
    </footer>

</body>
</html>
